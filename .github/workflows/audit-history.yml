name: View All History

on:
  workflow_dispatch:  # Manual trigger lang

jobs:
  show-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Complete Project History
        run: |
          echo "========================================"
          echo "   LAHAT NG NAGAWA SA PORTFOLIO MO"
          echo "========================================"
          echo ""
          echo "Total commits: $(git rev-list --count HEAD)"
          echo ""
          echo "Buong history:"
          git log --all --graph --decorate --oneline
          echo ""
          echo "Kada file, sino ang huling nag-edit:"
          git ls-files | while read file; do
            echo "$file - $(git log -1 --format='%an (%ad)' --date=short -- $file)"
          done
