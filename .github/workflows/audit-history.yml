name: View All History

on:
  workflow_dispatch:

jobs:
  show-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Show Project History
        run: |
          echo "=========================================="
          echo "ALL CHANGES IN YOUR PORTFOLIO"
          echo "=========================================="
          echo ""
          echo "Total commits:"
          git rev-list --count HEAD
          echo ""
          echo "Recent commits:"
          git log --oneline -10
          echo ""
          echo "Last editor per file:"
          git ls-files | head -20 | while read file; do
            editor=$(git log -1 --format="%an (%ad)" --date=short -- "$file")
            echo "$file -> $editor"
          done
          echo ""
          echo "Files changed in last push:"
          git diff --name-only HEAD~1 HEAD || echo "First commit"
          echo ""
          echo "Last 5 commits detailed:"
          git log -5 --format="%h | %an | %s | %ad" --date=short
