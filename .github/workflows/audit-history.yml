name: View All History

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  show-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Complete Project History
        run: |
          echo "=========================================="
          echo "   ALL CHANGES IN YOUR PORTFOLIO"
          echo "=========================================="
          echo ""
          echo "Total commits: $(git rev-list --count HEAD)"
          echo ""
          echo "FULL HISTORY:"
          git log --all --graph --decorate --oneline
          echo ""
          echo "LAST EDITOR PER FILE:"
          git ls-files | while read file; do
            last_editor=$(git log -1 --format='%an (%ad)' --date=short -- "$file" 2>/dev/null || echo "Unknown")
            echo "  $file -> $last_editor"
          done
          echo ""
          echo "FILES CHANGED IN LAST PUSH:"
          git diff --name-only HEAD~1 HEAD || echo "First commit - nothing to compare"
          echo ""
          echo "LAST 5 COMMITS (DETAILED):"
          git log -5 --format="%h | %an | %s | %ad" --date=short
