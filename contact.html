<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Marcy Angelo M. Villegas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00d4ff;
            --neon-gold: #ffd700;
            --dark-bg: #050510;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --text-primary: #e0e0e0;
            --text-secondary: #8899a6;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: auto;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-gold));
            border-radius: 5px;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--neon-cyan);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 60px;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(5, 5, 16, 0.95), transparent);
            backdrop-filter: blur(10px);
            animation: slideDown 0.6s ease;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .nav-links {
            display: flex;
            gap: 50px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            padding: 8px 0;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-gold));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 140px 60px 100px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            color: var(--neon-gold);
            border-color: var(--neon-gold);
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.2);
        }

        .page-header {
            margin-bottom: 60px;
            text-align: center;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 700;
            color: var(--neon-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-gold));
            border-radius: 2px;
        }

        .page-subtitle {
            color: var(--neon-cyan);
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 30px;
        }

        /* Contact Cards */
        .contact-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .contact-card {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            display: block;
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(30px);
        }

        .contact-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .contact-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 212, 255, 0.2);
        }

        .contact-icon-large {
            width: 80px;
            height: 80px;
            border: 3px solid var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 2.2rem;
            color: var(--neon-cyan);
            transition: all 0.4s ease;
            background: rgba(0, 212, 255, 0.1);
        }

        .contact-card:hover .contact-icon-large {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .contact-method {
            font-size: 1.3rem;
            color: var(--neon-gold);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .contact-detail {
            color: var(--text-secondary);
            font-size: 1rem;
            word-break: break-all;
            line-height: 1.6;
        }

        /* Contact Form */
        .form-section {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .form-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .form-section:hover {
            border-color: rgba(0, 212, 255, 0.4);
        }

        .form-title {
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin-bottom: 40px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 18px 22px;
            background: rgba(0, 212, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 1.05rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
            background: rgba(0, 212, 255, 0.08);
        }

        .form-textarea {
            min-height: 160px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-gold));
            border: none;
            color: var(--dark-bg);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .footer {
            width: 100%;
            padding: 60px 40px;
            text-align: center;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            background: rgba(5, 5, 16, 0.8);
            backdrop-filter: blur(10px);
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .navbar {
                justify-content: center;
                padding: 0 20px;
                height: 70px;
            }

            .nav-links {
                gap: 20px;
            }

            .main-content {
                padding: 120px 25px 80px;
            }

            .page-title {
                font-size: 2rem;
            }

            .form-section {
                padding: 35px 25px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .contact-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
    </div>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <a href="index.html" class="back-btn">← Back to Home</a>
        
        <div class="page-header">
            <h1 class="page-title">Get In Touch</h1>
            <p class="page-subtitle">Let's Work Together</p>
        </div>

        <div class="contact-cards">
            <a href="mailto:mmamvillegas@tip.edu.ph" class="contact-card">
                <div class="contact-icon-large">✉</div>
                <h2 class="contact-method">Email</h2>
                <p class="contact-detail">mmamvillegas@tip.edu.ph</p>
            </a>

            <a href="https://github.com/marcygelo1/portfolio" target="_blank" class="contact-card">
                <div class="contact-icon-large">⚡</div>
                <h2 class="contact-method">GitHub</h2>
                <p class="contact-detail">github.com/marcygelo1/portfolio</p>
            </a>

            <a href="#" class="contact-card" onclick="alert('LinkedIn profile coming soon!'); return false;">
                <div class="contact-icon-large">💼</div>
                <h2 class="contact-method">LinkedIn</h2>
                <p class="contact-detail">Connect with me</p>
            </a>
        </div>

        <div class="form-section" id="contactForm">
            <h2 class="form-title">
                <span>✉</span> Send Me a Message
            </h2>
            <form onsubmit="event.preventDefault(); handleSubmit();">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">👤 Your Name</label>
                        <input type="text" class="form-input" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">✉ Your Email</label>
                        <input type="email" class="form-input" placeholder="john@example.com" required>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label class="form-label">📋 Subject</label>
                    <input type="text" class="form-input" placeholder="Project Collaboration" required>
                </div>
                <div class="form-group full-width">
                    <label class="form-label">💬 Message</label>
                    <textarea class="form-textarea" placeholder="Tell me about your project, ideas, or just say hello..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    Send Message 🚀
                </button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p class="footer-text">© 2026 Marcy Angelo M. Villegas. All Rights Reserved.</p>
    </footer>

    <script>
        // Scroll Animation Observer
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.contact-card').forEach((card, index) => {
            card.style.transitionDelay = `${index * 0.1}s`;
            observer.observe(card);
        });

        observer.observe(document.getElementById('contactForm'));

        // Form submission handler
        function handleSubmit() {
            const btn = document.querySelector('.submit-btn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = 'Sending... ⏳';
            btn.style.opacity = '0.8';
            
            setTimeout(() => {
                btn.innerHTML = 'Message Sent! ✓';
                btn.style.background = 'linear-gradient(135deg, #00ff88, #00d4ff)';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                    btn.style.opacity = '1';
                    document.querySelector('form').reset();
                    alert('Thank you for your message! I will get back to you soon.');
                }, 1500);
            }, 1500);
        }
    </script>
</body>
</html>
