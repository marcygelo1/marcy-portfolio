<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Marcy Angelo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00d4ff;
            --neon-gold: #ffd700;
            --dark-bg: #050510;
            --panel-bg: rgba(10, 15, 30, 0.95);
            --text-primary: #e0e0e0;
            --text-secondary: #8899a6;
        }

        html, body {
            min-height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
        }

        /* Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--neon-cyan);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 50px;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(5, 5, 16, 0.95), transparent);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--neon-cyan);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-cyan);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        /* Main Content */
        .main-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 30px 80px;
        }

        .page-header {
            margin-bottom: 50px;
            text-align: center;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: var(--neon-cyan);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Contact Cards */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .contact-card {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .contact-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.1);
        }

        .contact-icon-large {
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 2rem;
            color: var(--neon-cyan);
            transition: all 0.3s ease;
        }

        .contact-card:hover .contact-icon-large {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        .contact-method {
            font-size: 1.2rem;
            color: var(--neon-gold);
            margin-bottom: 10px;
        }

        .contact-detail {
            color: var(--text-secondary);
            font-size: 0.95rem;
            word-break: break-all;
        }

        /* Message Form */
        .message-section {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
        }

        .section-title {
            font-size: 1.3rem;
            color: var(--neon-cyan);
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .submit-btn:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: var(--neon-gold);
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .navbar {
                justify-content: center;
                padding: 0 20px;
            }

            .nav-links {
                gap: 20px;
            }

            .main-content {
                padding: 100px 20px 60px;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .contact-container {
                grid-template-columns: 1fr;
            }

            .contact-card {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <a href="index.html" class="back-btn">← Back to Home</a>
        
        <div class="page-header">
            <h1 class="page-title">Get In Touch</h1>
            <p class="page-subtitle">Let's Work Together</p>
        </div>

        <div class="contact-container">
            <a href="mailto:mmamvillegas@tip.edu.ph" class="contact-card">
                <div class="contact-icon-large">✉</div>
                <h2 class="contact-method">Email</h2>
                <p class="contact-detail">mmamvillegas@tip.edu.ph</p>
            </a>

            <a href="https://github.com/marcygelo1/portfolio" target="_blank" class="contact-card">
                <div class="contact-icon-large">⚡</div>
                <h2 class="contact-method">GitHub</h2>
                <p class="contact-detail">github.com/marcygelo1/portfolio</p>
            </a>
        </div>

        <div class="message-section">
            <h2 class="section-title">Send a Message</h2>
            <form onsubmit="event.preventDefault(); alert('Message feature coming soon!');">
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-input" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Your Email</label>
                    <input type="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-textarea" placeholder="Tell me about your project..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
