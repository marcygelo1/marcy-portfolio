<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marcy Angelo M. Villegas | Frontend Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050510;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .gradient-mesh {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 128, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0, 255, 136, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(255, 215, 0, 0.2) 0%, transparent 40%);
            animation: meshMove 20s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(5%, 5%) rotate(5deg); }
            50% { transform: translate(-5%, 10%) rotate(-5deg); }
            75% { transform: translate(10%, -5%) rotate(3deg); }
        }

        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 212, 255, 0.03) 2px, rgba(0, 212, 255, 0.03) 4px);
            animation: scanlineMove 8s linear infinite;
        }

        @keyframes scanlineMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(10, 15, 30, 0.98);
            border-bottom: 2px solid #00d4ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo {
            color: #00d4ff;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #b8c5d6;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: #ffd700;
        }

        /* Mobile-First Main Container */
        .main-container {
            position: relative;
            margin-top: 60px;
            padding: 20px 15px 70px;
            min-height: calc(100vh - 60px);
            z-index: 10;
        }

        /* Profile Card - Mobile First */
        .center-card {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(10, 15, 30, 0.95);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .center-card.hidden {
            display: none;
        }

        .photo-area {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(255, 0, 128, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            flex-shrink: 0;
        }

        .photo-placeholder {
            color: #8899a6;
            font-size: 0.8rem;
            text-align: center;
        }

        .photo-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .name-section {
            text-align: center;
            width: 100%;
        }

        .name-section h1 {
            color: #ffd700;
            font-size: 1.4rem;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .name-section p {
            color: #00ff88;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Info Sections */
        .info-sections {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-box {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            border-radius: 0 10px 10px 0;
            padding: 18px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .info-box:active {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(0.98);
        }

        .info-box h3 {
            color: #00d4ff;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .info-box p {
            color: #a0b0c0;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        /* Content Panel - Mobile Full Screen */
        .content-panel {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100vh - 110px);
            background: rgba(5, 5, 16, 0.98);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            animation: slideUp 0.3s ease;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .panel-header {
            color: #ffd700;
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 50px;
        }

        .panel-header::before {
            content: '◆';
            color: #00d4ff;
        }

        .panel-content {
            color: #c0d0e0;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .panel-content p {
            margin-bottom: 15px;
        }

        /* Contact Section in Panel */
        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .contact-item {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 15px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .contact-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .contact-text h4 {
            color: #00d4ff;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .contact-text a {
            color: #b8c5d6;
            text-decoration: none;
            font-size: 0.85rem;
            word-break: break-all;
        }

        /* Close Button */
        .close-btn {
            position: fixed;
            top: 70px;
            right: 15px;
            width: 45px;
            height: 45px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(10, 15, 30, 0.98);
            border-top: 1px solid rgba(0, 212, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .footer span {
            color: #8899a6;
            font-size: 0.75rem;
            text-align: center;
        }

        /* Desktop Styles */
        @media (min-width: 769px) {
            .main-container {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px;
            }

            .center-card {
                width: 500px;
                max-width: 500px;
                padding: 40px;
                transition: all 0.6s ease;
            }

            .center-card.moved {
                position: fixed;
                top: 80px;
                right: 40px;
                width: 300px;
                transform: scale(0.9);
                transform-origin: top right;
            }

            .center-card.moved .photo-area {
                width: 120px;
                height: 120px;
            }

            .center-card.moved .name-section h1 {
                font-size: 1.2rem;
            }

            .center-card.moved .info-sections {
                display: none;
            }

            .photo-area {
                width: 180px;
                height: 180px;
                cursor: pointer;
            }

            .name-section {
                cursor: pointer;
            }

            .name-section h1 {
                font-size: 1.8rem;
            }

            .name-section p {
                font-size: 1rem;
            }

            .info-box:hover {
                background: rgba(0, 212, 255, 0.2);
                transform: translateX(10px);
            }

            .content-panel {
                position: fixed;
                top: 80px;
                left: 50px;
                width: calc(100% - 420px);
                max-width: 800px;
                height: calc(100vh - 160px);
                border-radius: 20px;
                border: 2px solid #00d4ff;
                background: rgba(10, 15, 30, 0.98);
                display: block;
                opacity: 0;
                transform: translateX(-30px);
                pointer-events: none;
                transition: all 0.4s ease;
            }

            .content-panel.active {
                opacity: 1;
                transform: translateX(0);
                pointer-events: all;
            }

            .close-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                width: 40px;
                height: 40px;
            }

            .close-btn:hover {
                background: #00d4ff;
                color: #0a0e27;
                transform: rotate(90deg);
            }

            .panel-header {
                font-size: 2rem;
                padding-right: 0;
            }

            .panel-content {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="gradient-mesh"></div>
        <div class="scanlines"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">Marcy Angelo</div>
        <div class="nav-links">
            <a href="#" onclick="showHome()">Home</a>
            <a href="#" onclick="showContact()">Contact</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Profile Card -->
        <div class="center-card" id="profileCard">
            <div class="photo-area" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
                <span class="photo-placeholder">Add Photo</span>
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
            </div>
            
            <div class="name-section" onclick="moveToCorner()">
                <h1>Marcy Angelo M. Villegas</h1>
                <p>Frontend Developer</p>
            </div>
            
            <div class="info-sections">
                <div class="info-box" onclick="showSection('whoiam')">
                    <h3>Who I Am</h3>
                    <p>Click to learn more about me</p>
                </div>
                
                <div class="info-box" onclick="showSection('personal')">
                    <h3>Personal Information</h3>
                    <p>Click to view my background</p>
                </div>
                
                <div class="info-box" onclick="showSection('strengths')">
                    <h3>Strengths</h3>
                    <p>Click to see my skills</p>
                </div>
            </div>
        </div>

        <!-- Content Panel -->
        <div class="content-panel" id="contentPanel">
            <button class="close-btn" onclick="closePanel()">×</button>
            <h2 class="panel-header" id="panelTitle">Title</h2>
            <div class="panel-content" id="panelContent"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span>© 2026 Marcy Angelo M. Villegas. All rights reserved.</span>
    </footer>

    <script>
        const isMobile = () => window.innerWidth <= 768;
        let cardMoved = false;

        const sectionData = {
            'whoiam': {
                title: 'Who I Am',
                content: '<p>I am Marcy Angelo M. Villegas, a dedicated and motivated individual who enjoys turning ideas into interactive digital experiences. I value continuous learning, creativity, and attention to detail. I am currently developing my expertise in frontend development while building projects that enhance both my technical and problem-solving skills.</p>'
            },
            'personal': {
                title: 'Personal Information',
                content: '<p>I am Marcy Angelo M. Villegas, a passionate Frontend Developer focused on creating clean, responsive, and user-friendly web interfaces. I have a strong interest in modern web technologies and continuously strive to improve my skills in building functional and visually appealing websites. I am dedicated to delivering quality work, learning new tools, and adapting to different challenges in the field of web development.</p>'
            },
            'strengths': {
                title: 'My Strengths',
                content: '<p>I am a detail-oriented and adaptable individual with a strong problem-solving mindset. I am a fast learner who is eager to continuously improve my skills in frontend development. I can work both independently and collaboratively, and I am committed to delivering quality work while staying open to learning new technologies and ideas.</p>'
            },
            'contact': {
                title: 'Contact Me',
                content: `
                    <p>Get in touch with me through the following channels:</p>
                    <div class="contact-links">
                        <div class="contact-item">
                            <div class="contact-icon">📧</div>
                            <div class="contact-text">
                                <h4>Email</h4>
                                <a href="mailto:mmamvillegas@tip.edu.ph">mmamvillegas@tip.edu.ph</a>
                            </div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">💻</div>
                            <div class="contact-text">
                                <h4>GitHub</h4>
                                <a href="https://github.com/marcygelo1/portfolio" target="_blank">github.com/marcygelo1/portfolio</a>
                            </div>
                        </div>
                    </div>
                `
            }
        };

        function showHome() {
            const card = document.getElementById('profileCard');
            const panel = document.getElementById('contentPanel');
            
            panel.classList.remove('active');
            
            if (!isMobile()) {
                card.classList.remove('moved');
                cardMoved = false;
            }
        }

        function showSection(section) {
            const card = document.getElementById('profileCard');
            const panel = document.getElementById('contentPanel');
            const title = document.getElementById('panelTitle');
            const content = document.getElementById('panelContent');
            
            const data = sectionData[section];
            title.textContent = data.title;
            content.innerHTML = data.content;
            
            panel.classList.add('active');
            
            if (!isMobile() && !cardMoved) {
                card.classList.add('moved');
                cardMoved = true;
            }
        }

        function showContact() {
            showSection('contact');
        }

        function moveToCorner() {
            if (isMobile() || cardMoved) return;
            
            const card = document.getElementById('profileCard');
            card.classList.add('moved');
            cardMoved = true;
        }

        function closePanel() {
            const panel = document.getElementById('contentPanel');
            const card = document.getElementById('profileCard');
            
            panel.classList.remove('active');
            
            if (!isMobile()) {
                card.classList.remove('moved');
                cardMoved = false;
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const placeholder = document.querySelector('.photo-placeholder');
                    placeholder.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
                    placeholder.style.padding = '0';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Handle resize
        window.addEventListener('resize', () => {
            if (!isMobile() && cardMoved) {
                const card = document.getElementById('profileCard');
                card.classList.add('moved');
            }
        });
    </script>
</body>
</html>
