<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marcy Angelo M. Villegas | Frontend Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        body {
            background: #050510;
            position: relative;
            padding-bottom: 60px;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .gradient-mesh {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 128, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0, 255, 136, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(255, 215, 0, 0.2) 0%, transparent 40%);
            animation: meshMove 20s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(5%, 5%) rotate(5deg); }
            50% { transform: translate(-5%, 10%) rotate(-5deg); }
            75% { transform: translate(10%, -5%) rotate(3deg); }
        }

        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 212, 255, 0.03) 2px, rgba(0, 212, 255, 0.03) 4px);
            animation: scanlineMove 8s linear infinite;
        }

        @keyframes scanlineMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center top;
            animation: gridMove 15s linear infinite;
            opacity: 0.3;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00d4ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d4ff;
            animation: floatUp linear infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-duration: 12s; }
        .particle:nth-child(2) { left: 20%; animation-duration: 15s; animation-delay: 2s; background: #ff0080; box-shadow: 0 0 10px #ff0080; }
        .particle:nth-child(3) { left: 30%; animation-duration: 10s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-duration: 18s; animation-delay: 1s; background: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .particle:nth-child(5) { left: 50%; animation-duration: 14s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-duration: 11s; animation-delay: 5s; background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .particle:nth-child(7) { left: 70%; animation-duration: 16s; animation-delay: 2s; }
        .particle:nth-child(8) { left: 80%; animation-duration: 13s; animation-delay: 4s; background: #ff0080; box-shadow: 0 0 10px #ff0080; }
        .particle:nth-child(9) { left: 90%; animation-duration: 17s; animation-delay: 1s; }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Top Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(10, 15, 30, 0.95);
            border-bottom: 2px solid #00d4ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 30px rgba(0, 212, 255, 0.3);
        }

        .logo {
            color: #00d4ff;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: #b8c5d6;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a:hover {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, #ffd700);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Main Container */
        .main-container {
            position: relative;
            margin-top: 60px;
            min-height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            z-index: 10;
        }

        /* Center Profile Card - Desktop */
        .center-card {
            width: 100%;
            max-width: 500px;
            background: rgba(10, 15, 30, 0.95);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 
                0 0 50px rgba(0, 212, 255, 0.4),
                inset 0 0 30px rgba(0, 212, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .center-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00d4ff, #ff0080, #ffd700, #00ff88, #00d4ff);
            border-radius: 20px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
            background-size: 400% 400%;
            animation: borderGlow 3s ease infinite;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .center-card:hover::before {
            opacity: 0.5;
        }

        .center-card.moved {
            position: fixed;
            top: 80px;
            right: 40px;
            width: 280px;
            padding: 25px;
            transform: scale(0.85);
            transform-origin: top right;
            z-index: 50;
        }

        .center-card.moved .photo-area {
            width: 120px;
            height: 120px;
        }

        .center-card.moved .name-section h1 {
            font-size: 1.1rem;
        }

        .center-card.moved .name-section p {
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        .center-card.moved .info-sections {
            display: none;
        }

        .photo-area {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(255, 0, 128, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            animation: photoPulse 3s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .photo-area:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.6);
        }

        @keyframes photoPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 136, 0.5); }
        }

        .photo-placeholder {
            color: #8899a6;
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
        }

        .photo-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .name-section {
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .name-section:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .name-section h1 {
            color: #ffd700;
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            letter-spacing: 1px;
            word-wrap: break-word;
        }

        .name-section p {
            color: #00ff88;
            font-size: 0.95rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Info Sections - Clickable */
        .info-sections {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-box {
            background: rgba(0, 212, 255, 0.08);
            border-left: 3px solid #00d4ff;
            border-radius: 0 10px 10px 0;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-box::before {
            content: '→';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00d4ff;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .info-box:hover {
            background: rgba(0, 212, 255, 0.2);
            border-left-color: #ffd700;
            transform: translateX(10px);
            padding-right: 40px;
        }

        .info-box:hover::before {
            opacity: 1;
            right: 20px;
        }

        .info-box h3 {
            color: #00d4ff;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .info-box p {
            color: #a0b0c0;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        /* Content Panel */
        .content-panel {
            position: fixed;
            top: 80px;
            left: 40px;
            width: calc(100% - 380px);
            max-width: 700px;
            height: calc(100vh - 140px);
            background: rgba(10, 15, 30, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 35px;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.5s ease;
            pointer-events: none;
            overflow-y: auto;
            z-index: 20;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }

        .content-panel.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .panel-header {
            color: #ffd700;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .panel-header::before {
            content: '◆';
            color: #00d4ff;
            font-size: 1.5rem;
        }

        .panel-content {
            color: #c0d0e0;
            font-size: 1rem;
            line-height: 1.9;
        }

        .panel-content p {
            margin-bottom: 20px;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .contact-item {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateX(10px);
            border-color: #ffd700;
        }

        .contact-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .contact-text h4 {
            color: #00d4ff;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .contact-text a {
            color: #b8c5d6;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            word-break: break-all;
        }

        .contact-text a:hover {
            color: #ffd700;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .close-btn:hover {
            background: #00d4ff;
            color: #0a0e27;
            transform: rotate(90deg);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(10, 15, 30, 0.95);
            border-top: 1px solid rgba(0, 212, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .footer span {
            color: #8899a6;
            font-size: 0.8rem;
            text-align: center;
            padding: 0 10px;
        }

        /* ==================== MOBILE RESPONSIVE ==================== */
        @media (max-width: 1024px) {
            .content-panel {
                width: calc(100% - 350px);
                left: 30px;
            }
            
            .center-card.moved {
                right: 30px;
                width: 260px;
            }
        }

        @media (max-width: 768px) {
            /* Navbar Mobile */
            .navbar {
                height: 55px;
                padding: 0 20px;
            }

            .logo {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            .nav-links {
                gap: 20px;
            }

            .nav-links a {
                font-size: 0.85rem;
                letter-spacing: 0.5px;
            }

            /* Main Container Mobile */
            .main-container {
                margin-top: 55px;
                padding: 20px 15px;
                min-height: calc(100vh - 105px);
            }

            /* Card Mobile - Always Centered */
            .center-card {
                width: 100%;
                max-width: 100%;
                padding: 25px 20px;
                gap: 15px;
            }

            .center-card.moved {
                position: relative;
                top: auto;
                right: auto;
                width: 100%;
                transform: none;
                transform-origin: center;
                z-index: 10;
            }

            .center-card.moved .photo-area {
                width: 100px;
                height: 100px;
            }

            .center-card.moved .name-section h1 {
                font-size: 1.2rem;
            }

            .center-card.moved .name-section p {
                font-size: 0.8rem;
            }

            .center-card.moved .info-sections {
                display: flex;
            }

            /* Photo Mobile */
            .photo-area {
                width: 130px;
                height: 130px;
            }

            /* Name Mobile */
            .name-section h1 {
                font-size: 1.3rem;
            }

            .name-section p {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }

            /* Info Boxes Mobile */
            .info-box {
                padding: 15px;
            }

            .info-box h3 {
                font-size: 0.9rem;
            }

            .info-box p {
                font-size: 0.75rem;
            }

            .info-box::before {
                display: none;
            }

            .info-box:hover {
                padding-right: 15px;
            }

            /* Content Panel Mobile - Full Screen Overlay */
            .content-panel {
                position: fixed;
                top: 55px;
                left: 0;
                width: 100%;
                height: calc(100vh - 105px);
                max-width: 100%;
                border-radius: 0;
                padding: 60px 20px 20px;
                z-index: 50;
                transform: translateY(100%);
            }

            .content-panel.active {
                transform: translateY(0);
            }

            .panel-header {
                font-size: 1.4rem;
                margin-bottom: 20px;
                padding-bottom: 12px;
            }

            .panel-content {
                font-size: 0.95rem;
            }

            .panel-content p {
                margin-bottom: 15px;
            }

            /* Contact Mobile */
            .contact-links {
                gap: 15px;
            }

            .contact-item {
                padding: 15px;
            }

            .contact-icon {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }

            .contact-text h4 {
                font-size: 1rem;
            }

            .contact-text a {
                font-size: 0.85rem;
            }

            /* Close Button Mobile */
            .close-btn {
                top: 10px;
                right: 10px;
                width: 45px;
                height: 45px;
            }

            /* Footer Mobile */
            .footer {
                height: 45px;
            }

            .footer span {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 0 15px;
            }

            .logo {
                font-size: 0.9rem;
            }

            .nav-links {
                gap: 15px;
            }

            .nav-links a {
                font-size: 0.8rem;
            }

            .center-card {
                padding: 20px 15px;
            }

            .photo-area {
                width: 110px;
                height: 110px;
            }

            .name-section h1 {
                font-size: 1.1rem;
            }

            .name-section p {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }

            .info-box {
                padding: 12px;
            }

            .info-box h3 {
                font-size: 0.85rem;
            }

            .info-box p {
                font-size: 0.7rem;
            }

            .panel-header {
                font-size: 1.2rem;
            }

            .panel-content {
                font-size: 0.9rem;
                line-height: 1.7;
            }
        }

        /* Landscape Mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .main-container {
                padding: 15px;
            }

            .center-card {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }

            .photo-area {
                width: 80px;
                height: 80px;
            }

            .name-section {
                flex: 1;
                min-width: 200px;
            }

            .info-sections {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .info-box {
                flex: 1;
                min-width: 140px;
            }

            .content-panel {
                top: 55px;
                height: calc(100vh - 55px);
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="gradient-mesh"></div>
        <div class="scanlines"></div>
        <div class="grid"></div>
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">Marcy Angelo</div>
        
        <div class="nav-links">
            <a href="#" onclick="returnToCenter()">Home</a>
            <a href="#" onclick="showContact()">Contact</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Center Profile Card -->
        <div class="center-card" id="profileCard">
            <div class="photo-area" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
                <span class="photo-placeholder">Add Photo</span>
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
            </div>
            
            <div class="name-section" onclick="moveToCorner()">
                <h1>Marcy Angelo M. Villegas</h1>
                <p>Frontend Developer</p>
            </div>
            
            <!-- Info Sections -->
            <div class="info-sections">
                <div class="info-box" onclick="openSection('whoiam')">
                    <h3>Who I Am</h3>
                    <p>Click to learn more about me</p>
                </div>
                
                <div class="info-box" onclick="openSection('personal')">
                    <h3>Personal Information</h3>
                    <p>Click to view my background</p>
                </div>
                
                <div class="info-box" onclick="openSection('strengths')">
                    <h3>Strengths</h3>
                    <p>Click to see my skills</p>
                </div>
            </div>
        </div>

        <!-- Content Panel -->
        <div class="content-panel" id="contentPanel">
            <button class="close-btn" onclick="returnToCenter()" title="Return to Center">×</button>
            <h2 class="panel-header" id="panelTitle">Section Title</h2>
            <div class="panel-content" id="panelContent">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span>© 2026 Marcy Angelo M. Villegas. All rights reserved.</span>
    </footer>

    <script>
        let isMoved = false;
        let isMobile = window.innerWidth <= 768;

        // Check for mobile on resize
        window.addEventListener('resize', () => {
            isMobile = window.innerWidth <= 768;
            if (isMobile && isMoved) {
                returnToCenter();
            }
        });

        const sectionData = {
            'whoiam': {
                title: 'Who I Am',
                content: '<p>I am Marcy Angelo M. Villegas, a dedicated and motivated individual who enjoys turning ideas into interactive digital experiences. I value continuous learning, creativity, and attention to detail. I am currently developing my expertise in frontend development while building projects that enhance both my technical and problem-solving skills.</p>'
            },

        function moveToCorner() {
            if (isMoved || isMobile) return;
            
            const card = document.getElementById('profileCard');
            card.classList.add('moved');
            isMoved = true;
        }

        function openSection(section) {
            if (!isMobile) {
                moveToCorner();
            }
            
            const panel = document.getElementById('contentPanel');
            const title = document.getElementById('panelTitle');
            const content = document.getElementById('panelContent');
            
            const data = sectionData[section];
            title.textContent = data.title;
            content.innerHTML = data.content;
            
            panel.classList.add('active');
        }

        function showContact() {
            if (!isMobile) {
                moveToCorner();
            }
            
            const panel = document.getElementById('contentPanel');
            const title = document.getElementById('panelTitle');
            const content = document.getElementById('panelContent');
            
            const data = sectionData['contact'];
            title.textContent = data.title;
            content.innerHTML = data.content;
            
            panel.classList.add('active');
        }

        function returnToCenter() {
            const card = document.getElementById('profileCard');
            const panel = document.getElementById('contentPanel');
            
            card.classList.remove('moved');
            panel.classList.remove('active');
            
            isMoved = false;
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const placeholder = document.querySelector('.photo-placeholder');
                    placeholder.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
                    placeholder.style.padding = '0';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
